bind -n C-w kill-pane
bind -n C-n new-window
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
bind -n C-'{' resize-pane -L 5
bind -n C-'}' resize-pane -R 5

bind -n C-_ resize-pane -D 5
bind -n C-+ resize-pane -U 5
set -g renumber-windows on


bind-key -n F1 selectw -t 1
bind-key -n F2 selectw -t 2
bind-key -n F3 selectw -t 3
bind-key -n F4 selectw -t 4
bind-key -n F5 selectw -t 5
bind-key -n F6 selectw -t 6
# Pane borders
set -g pane-border-style "fg=#555555"
set -g pane-active-border-style "fg=#99bb99"
# Status Bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default"
set -g status-left ""
# Ensure the date string is quoted
set -g status-right-style "fg=#8a9aaa"
set -g status-right "%H:%M | %Y-%m-%d "
# Window Status
setw -g window-status-current-style "fg=#99bb99,bold"
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-style "fg=#708090"
setw -g window-status-format " #I:#W "
# Messages
set -g message-style "fg=#99bb99,bg=#101010,bold"
